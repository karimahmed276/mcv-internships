<!DOCTYPE html>
<html>
<head>
<title>animation</title>

<style>

body{
    background:#f4eeee;
}

.card{
    width:450px;
    height:250px;
    border:3px solid rgb(19, 19, 19);
    border-radius:20px;
    margin:100px auto;
    position:relative;
    overflow:hidden;
}

.man{
    width:80px;
    position:absolute;
    left:20px;
    bottom:10px;
    animation:man 2s infinite;
}

.girl{
    width:80px;
    position:absolute;
    left:180px;
    bottom:10px;
    animation:girl 2s infinite;
}

.weight{
    width:80px;
    position:absolute;
    right:20px;
    bottom:10px;
    animation:weight 2s infinite;
}

@keyframes man{
    50%{
        transform:translateY(-15px);
    }
}

@keyframes girl{
    50%{
        transform:translateX(15px);
    }
}

@keyframes weight{
    50%{
        transform:rotate(15deg);
    }
}

</style>

</head>

<body>

<div class="card">
    <img src="pngwing.com.png" class="man">
    <img src="pngwing.com (1).png" class="girl">
    <img src="pngwing.com (2).png" class="weight">
</div>

</body>
</html>
