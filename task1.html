<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    align-items:center;
    gap:60px;
}

.left{
    display:flex;
    flex-direction:column;
    gap:30px;
}

.card{
    width:170px;
    height:170px;
    background:#fff;
    border:3px solid rgb(0, 0, 0);
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
}

.big-card{
    width:420px;
    height:420px;
    background:#fff;
    border:3px solid rgb(0, 0, 0);
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </div>

    <div class="right">
        <div class="big-card">
            Big Card
        </div>
    </div>

</div>

</body>
</html>
