<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoFolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#fff;
}

header{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px 8%;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.logo i{
    color:#18c37d;
}

.icons{
    display:flex;
    gap:20px;
    font-size:22px;
}

.icons i{
    cursor:pointer;
    transition:.3s;
}

.icons i:hover{
    color:#18c37d;
}

.hero{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:65px;
    line-height:1.2;
    font-family:Georgia, serif;
}

.hero span{
    color:#18c37d;
    border-bottom:5px solid #18c37d;
}

.hero p{
    margin:30px 0;
    color:#bfbfbf;
    max-width:700px;
    line-height:1.8;
    font-size:20px;
}

.hero button{
    padding:18px 40px;
    border:none;
    background:#18c37d;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

.hero button:hover{
    background:#109863;
}

.gallery{
    width:90%;
    margin:60px auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.gallery img{
    width:350px;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:30px;
    color:#aaa;
    border-top:1px solid #333;
}

@media(max-width:768px){

.logo{
    font-size:24px;
}

.icons{
    font-size:18px;
    gap:15px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    font-size:16px;
}

.hero button{
    width:90%;
    max-width:300px;
}

.gallery img{
    width:100%;
    height:250px;
}

}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">
<i class="fa-solid fa-camera"></i>
PhotoFolio
</div>

<div class="icons">
<i class="fa-brands fa-x-twitter"></i>
<i class="fa-brands fa-facebook"></i>
<i class="fa-brands fa-instagram"></i>
<i class="fa-brands fa-linkedin"></i>
<i class="fa-solid fa-bars"></i>
</div>

</nav>

<div class="hero">

<h1>
I'm <span>Jenny Wilson</span><br>
a Professional <br>
Photographer from <br>
New York City
</h1>

<p>
Blanditiis praesentium aliquam illum tempore incidunt debitis dolorem magni est deserunt sed qui libero.
</p>

<button>AVAILABLE FOR HIRE</button>

</div>

</header>
<!-- Gallery -->

<section class="gallery">

    <img src="images/img1.jpg" alt="Image 1">
    <img src="images/img2.jpg" alt="Image 2">
    <img src="images/img3.jpg" alt="Image 3">
    <img src="images/img4.jpg" alt="Image 4">
    <img src="images/img5.jpg" alt="Image 5">
    <img src="images/img6.jpg" alt="Image 6">
    <img src="images/img7.jpg" alt="Image 7">
    <img src="images/img8.jpg" alt="Image 8">

</section>

<!-- Footer -->

<footer>

    <h2>PhotoFolio</h2>

    <p>
        © Copyright <strong>PhotoFolio</strong>.
        All Rights Reserved
    </p>

    <br>

    <div class="icons">
        <i class="fa-brands fa-x-twitter"></i>
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-linkedin"></i>
    </div>

</footer>

</body>
</html>
