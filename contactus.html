<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Contact Us</h1>
<form>
<label>Full Name:</label><br>
<input type="text" placeholder="Your Name">
<br><br>
<label>Email Address:</label><br>
<input type="email" placeholder="example@domain.com">
<br><br>
<label>Phone Number:</label><br>
<input type="tel" placeholder="0123456789">
<br><br>
<label>Preferred Contact Method:</label><br>
<input type="radio" name="contact"> Phone
<input type="radio" name="contact"> Email
<br><br>
<label>Preferred Contact Method:</label><br>
<input type="radio" name="ll"> Phone
<input type="radio" name="ll"> Email
<input type="radio" name="ll"> instagram
<br><br>
<label>Services Interested In:</label><br>
<input type="checkbox"> Web Design
<input type="checkbox"> SEO
<input type="checkbox"> Hosting
<br><br>
<label>City:</label><br>
<select>
    <option>--Select City--</option>
    <option>Cairo</option>
    <option>Alexandria</option>
    <option>Giza</option>
</select>
<br><br>
<label>Your Message:</label><br>
<textarea rows="6" cols="40" placeholder="Write your message here..."></textarea>
<br><br>
<input type="submit" value="Send Message">
</form>
</body>
</html>
</body>
</html>
