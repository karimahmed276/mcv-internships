<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traffic Light</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ddd;
}

.traffic{
    width:170px;
    background:#333;
    padding:20px;
    border-radius:20px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.light{
    width:100px;
    height:100px;
    border-radius:50%;
}

/* Desktop */
.red{
    background:red;
}

.yellow{
    background:yellow;
}

.green{
    background:green;
}

/* Tablet */
@media(max-width:992px){

body{
    background:#ffe4b5;
}

.red{
    background:blue;
}

.yellow{
    background:orange;
}

.green{
    background:purple;
}

}

/* Mobile */
@media(max-width:768px){

body{
    background:#222;
}

.red{
    background:pink;
}

.yellow{
    background:cyan;
}

.green{
    background:lime;
}

}

</style>

</head>
<body>

<div class="traffic">

<div class="light red"></div>

<div class="light yellow"></div>

<div class="light green"></div>

</div>

</body>
</html>
